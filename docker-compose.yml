services:
  # ─────────────────────────────────────────
  # MongoDB (session store for auth)
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: embedmindai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - embedmindai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: embedmindai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      # Inside Docker, use the service name "mongo" as the hostname
      - MONGODB_URI=mongodb://mongo:27017/embedmindai
    volumes:
      - backend_uploads:/app/uploads
      - backend_chromadb:/app/chromadb_storage
      # Hot-reload: mount source code in development
      # Comment this out for production builds
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - embedmindai-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/test')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ─────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: embedmindai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - embedmindai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

# ─────────────────────────────────────────
# Named volumes for persistent data
# ─────────────────────────────────────────
volumes:
  backend_uploads:
    driver: local
  backend_chromadb:
    driver: local
  mongo_data:
    driver: local

# ─────────────────────────────────────────
# Internal bridge network
# ─────────────────────────────────────────
networks:
  embedmindai-network:
    driver: bridge
